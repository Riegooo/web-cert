<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="./style/login_register.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Righteous&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-name">
            <h1>&lt;/&gt;WebCert</h1>
        </div>
        <nav>
            
        </nav>
    </header>
    <div class="main-container">
        <div class="main-content">

            <div class="left-content">

            </div>

            <div class="right-content">
                <div class="right-adjust">
                    <div class="input-header">
                        <h1>Login your account</h1>
                    </div>
                    <div class="card-content">
                        <label for="">Username</label><br>
                        <input type="text" placeholder="John doe" name="username" id="username"><br>
                    </div>

                    <div class="card-content">
                        <label for="">Password</label><br>
                        <input type="password" placeholder="Create your password" name="password" id="password">
                    </div>

                    <div class="buttons">
                        <button id="login_account" class="button_one">Sign in</button>
                        <p>Already Have an Account?</p>
                        <button onclick="registerPath()" class="button_two">Create an account</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./javascript/login_fetch.js" type="text/javascript"></script>
</body>
</html>
