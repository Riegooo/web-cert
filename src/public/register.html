<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="./style/register_page.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Righteous&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-name">
            <h1>Web Cert</h1>
        </div>
        <nav>
            
        </nav>
    </header>
    <div class="main-container">
        <div class="register-content">
            <div class="register-header">
                <h1>REGISTER</h1>
            </div>

            <div class="input_f_l">
                <div class="input_fname">
                    <label for="">First Name</label><br>
                    <input type="text" placeholder="John" name="firstname" id="firstname"><br>
                </div>
                <div class="input_lname">
                    <label for="">Last Name</label><br>
                    <input type="text" placeholder="doe" name="lastname" id="lastname"><br>
                </div>
            </div>
            <div class="card-content">
                <label for="">Username</label><br>
                <input type="text" placeholder="John doe" name="username" id="username"><br>
            </div>

            <div class="card-content">
                <label for="">Email</label><br>
                <input type="email" placeholder="johndoe@gmail.com" name="email" id="email"><br>
            </div>

            <div class="card-content">
                <label for="">Password</label><br>
                <input type="password" placeholder="Create your password" name="password" id="password">
            </div>

            <div class="buttons">
                <button id="create_account">Create Account</button>
                <p>Already Have an Account? <button onclick="loginPath()">Login Here</button></p>
            </div>
        </div>
    </div>

    <script src="./javascript/register_fetch.js" type="text/javascript"></script>
</body>
</html>
